name: build and upload MuffinStore

on:
  workflow_dispatch:
    inputs:
      tagname:
        description: "Tag used for release"
        default: "Experimental"
        required: true
        type: string
      releasename:
        description: "Name used for release"
        default: "1.1-1"
        required: true
        type: string
  
jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup theos
        uses: Randomblock1/theos-action@v1

      - name: Switch Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.0.app/Contents/Developer

      - name: Build and Package MuffinStore
        run: |
          cd $GITHUB_WORKSPACE
          FINALPACKAGE=1 gmake clean package
          mkdir -p ./output
          mv ./packages/*.ipa ./output/MuffinStore-$(git rev-parse --short HEAD).ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuffinStore IPA
          path: ./output/*.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        env:
          TAGNAME: ${{ inputs.tagname }}
          RELEASENAME: ${{ inputs.releasename }}
        with:
          tag_name: ${{ env.TAGNAME }}
          name: ${{ env.RELEASENAME }}
          files: ./output/*.ipa
